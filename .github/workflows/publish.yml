name: Publish to Maven Central

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  publish:
    name: Build and Publish Snapshots to Maven Central
    runs-on: macos-15
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Select Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app | head -n 1)/Contents/Developer
          if [ -d "$XCODE_PATH" ]; then
            echo "Selecting Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH"
          else
            echo "Xcode 16 not found, using default Xcode version"
          fi
          xcodebuild -version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run host unit tests
        run: ./gradlew test -Pdisable.web.targets=true

      - name: Publish Snapshots
        run: ./gradlew publishAllPublicationsToCentralSnapshotsRepository -Psnapshot=true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
